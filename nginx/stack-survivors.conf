# 최초 배포용 임시 Nginx 설정 (80번 포트만 개방)
server {
    listen 80;
    server_name api.stack-survivors.duckdns.org stack-survivors.duckdns.org;
    
    # Let's Encrypt 챌린지 경로 (global-proxy의 certbot webroot와 연결됨)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 아직 SSL이 없으므로 임시로 80번 포트에서 바로 프론트엔드 연결
    # (인증서 발급 후에는 이 부분을 return 301 https://$host$request_uri; 로 수정하고 443 블록을 추가합니다)
    location / {
        proxy_pass http://stack-survivors-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
