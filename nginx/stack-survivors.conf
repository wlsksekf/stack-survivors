# HTTP (80) -> HTTPS (443) Redirection
server {
    listen 80;
    server_name api.stack-survivors.site stack-survivors.site;
    
    # Allow Let's Encrypt challenge if master Nginx uses webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (443) -> Proxy to containers
server {
    listen 443 ssl;
    server_name api.stack-survivors.site stack-survivors.site;

    # The master Nginx must have these certificates configured
    # You will need to issue them via the master Nginx's certbot
    ssl_certificate /etc/letsencrypt/live/api.stack-survivors.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.stack-survivors.site/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # API Backend proxy (Docker network DNS: stack-survivors-backend)
    location /api/ {
        proxy_pass http://stack-survivors-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend proxy (Docker network DNS: stack-survivors-frontend)
    location / {
        proxy_pass http://stack-survivors-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}
