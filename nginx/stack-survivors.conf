# HTTP (80) -> HTTPS (443) 강제 리다이렉트
server {
    listen 80;
    server_name api.stack-survivors.duckdns.org stack-survivors.duckdns.org;
    
    # Let's Encrypt 챌린지 경로 (자동 갱신용)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 HTTP 요청은 HTTPS로 넘김
    location / {
        return 301 https://$host$request_uri;
    }
}

# 정식 서비스 (443 SSL)
server {
    listen 443 ssl;
    server_name api.stack-survivors.duckdns.org stack-survivors.duckdns.org;

    # 방금 전 성공적으로 발급받은 인증서 경로 연결
    ssl_certificate /etc/letsencrypt/live/api.stack-survivors.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.stack-survivors.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 백엔드 API 서버 (FastAPI) 프록시
    location /api/ {
        proxy_pass http://stack-survivors-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 프론트엔드 (Vite/React) 웹소켓 및 정적 리소스 프록시
    location / {
        proxy_pass http://stack-survivors-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 통신 지원 (필수)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}
