server {
    listen 80;
    server_name stack-survivors.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name stack-survivors.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/stack-survivors.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stack-survivors.duckdns.org/privkey.pem;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 도커 내부 DNS 지정
    resolver 127.0.0.11 valid=30s;

    location / {
        set $front "http://stack-survivors-frontend:80";
        proxy_pass $front;
    }

    # FastAPI 백엔드 라우팅
    location /api/ {
        set $back "http://stack-survivors-backend:8000";
        proxy_pass $back;
    }

    # 웹소켓 라우팅 (필요한 경우)
    location /ws/ {
        set $ws "http://stack-survivors-backend:8000";
        proxy_pass $ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_buffering off;
    }
}
