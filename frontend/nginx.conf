server {
    # 80번 포트 수신
    listen 80;

    # 정적 파일 서빙 기본 경로 설정
    root /usr/share/nginx/html;

    # SPA 라우팅 지원을 위한 설정
    # 요청된 URI에 해당하는 파일이나 디렉터리가 없으면 index.html로 포워딩
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 자원 캐싱 최적화 설정
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff2?|eot|ttf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
