version: '3.8'

services:
  backend:
    image: ${DOCKER_USERNAME:-local}/stack-survivors-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stack-survivors-backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    networks:
      - global-network
    restart: always

  frontend:
    image: ${DOCKER_USERNAME:-local}/stack-survivors-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stack-survivors-frontend
    depends_on:
      - backend
    networks:
      - global-network
    restart: always

networks:
  global-network:
    external: true
