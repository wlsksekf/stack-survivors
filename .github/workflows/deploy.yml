name: Deploy to Oracle Server

# main 브랜치에 코드가 푸시(push)되면 자동으로 배포 파이프라인이 실행됩니다.
on:
  push:
    branches:
      - main # 이제 main 브랜치 푸시 시 자동 배포됩니다.
  workflow_dispatch: # GitHub Actions 탭에서 수동으로 실행할 수 있는 옵션

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/stack-survivors-frontend:latest

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/stack-survivors-backend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Server and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ ! -d "~/stack-survivors" ]; then
              git clone https://github.com/wlsksekf/stack-survivors.git ~/stack-survivors
            fi
            cd ~/stack-survivors
            echo "${{ secrets.DOT_ENV }}" > .env
            git pull origin main
            docker compose pull
            docker compose up -d --build
            
            # 마스터 Nginx에 설정 파일 복사 및 재시작 (권한 필요시 sudo 사용)
            sudo cp nginx/stack-survivors.conf /etc/nginx/conf.d/
            sudo systemctl reload nginx
