name: Deploy to Oracle Server

# main 브랜치에 코드가 푸시(push)되면 자동으로 배포 파이프라인이 실행됩니다.
on:
  push:
    branches:
      - main # 이제 main 브랜치 푸시 시 자동 배포됩니다.
  workflow_dispatch: # GitHub Actions 탭에서 수동으로 실행할 수 있는 옵션

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/stack-survivors-frontend:latest

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/stack-survivors-backend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. 원래 프로젝트 파일 전송
      - name: Transfer config files to Oracle VM
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.SERVER_USER }}/stack-survivors"
      
      # 2. Stack Survivors Nginx 설정을 메인 프록시 폴더로 직접 전송
      - name: Transfer Nginx Config to Global Proxy
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "nginx/stack-survivors.conf"
          target: "/home/${{ secrets.SERVER_USER }}/global-proxy"

      - name: SSH into Server and Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.SERVER_USER }}/stack-survivors
            
            echo "${{ secrets.DOT_ENV }}" > .env
            
            # Docker Hub 자격 증명 로그인
            echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            docker compose pull
            docker compose down --remove-orphans
            docker compose up -d

            # 메인 Nginx 가상 네트워크망 및 설정 파일 최종 동기화
            echo "Syncing Global Proxy Nginx..."
            cd /home/${{ secrets.SERVER_USER }}/global-proxy
            docker compose down
            docker compose up -d

            # 인증서 자동 발급 시도 (이미 유효한 인증서가 있으면 --keep-until-expiring 에 의해 무시됨)
            # 최초 배포(80포트 모드)인 경우 여기서 인증서를 발급받음
            docker compose run --rm certbot certonly \
              --webroot -w /var/www/certbot \
              -d api.stack-survivors.site \
              -d stack-survivors.site \
              --email admin@stack-survivors.site \
              --agree-tos \
              --no-eff-email \
              --keep-until-expiring
