name: Deploy to Oracle Server

# 푸시해도 자동 실행되지 않도록, 존재하지 않는 브랜치를 지정하거나 
# 수동으로만 실행(workflow_dispatch)되도록 설정해 두었습니다.
on:
  push:
    branches:
      - 'placeholder-branch-for-deploy' # 메인 브랜치가 아닌 임시 브랜치
  workflow_dispatch: # GitHub Actions 탭에서 수동으로 실행할 수 있는 옵션

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. Docker 이미지 빌드 및 푸시
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/stack-survivors-frontend:latest

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/stack-survivors-backend:latest

      # 2. 서버 접속 후 배포 갱신
      - name: SSH into Server and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/stack-survivors || cd /path/to/stack-survivors
            echo "${{ secrets.DOT_ENV }}" > .env
            git pull origin main
            docker-compose pull
            docker-compose up -d --build
